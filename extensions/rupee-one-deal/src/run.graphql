query RunInput {
  discount {
    discountClasses
    metafield(namespace: "$app:rupee-one-deal", key: "function-configuration") {
      jsonValue
    }
  }
  triggeringDiscountCode
  cart {
    lines {
      id
      quantity
      offerType: attribute(key: "_offer_type") {
        value
      }
      offerCollectionId: attribute(key: "_offer_collection_id") {
        value
      }
      cost {
        subtotalAmount {
          amount
          currencyCode
        }
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          title
          product {
            id
          }
        }
      }
    }
  }
}
